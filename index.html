<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Tech Evyta</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .foto-evy {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00eaff;
            box-shadow: 0 0 20px #00eaff;
            margin-top: 20px;
        }

        .banner {
            width: 100%;
            max-width: 350px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 25px #ff00ff;
        }

        .btn {
            display: block;
            width: 90%;
            max-width: 300px;
            margin: 20px auto;
            padding: 15px;
            background: linear-gradient(90deg, #00eaff, #ff00ff);
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 0 15px #00eaff;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- FOTO EVYTA (sube una carpeta hacia arriba) -->
        <img src="../foto-evy.png" alt="Foto Evyta" class="foto-evy">

        <!-- BANNER FUTURISTA (sube una carpeta hacia arriba) -->
        <img src="../imagen-futurista.png" alt="Imagen Futurista" class="banner">

        <h2>Digital Tech Evyta</h2>

        <!-- BOTÓN PRINCIPAL -->
        <a href="https://evyta.netlify.app" class="btn">Visitar Sitio Web</a>

    </div>

</body>
</html>
